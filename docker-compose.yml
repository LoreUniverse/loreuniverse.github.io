services:
  postgres:
    image: postgres:17-alpine
    container_name: loreuniverse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
      POSTGRES_DB: lore_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
