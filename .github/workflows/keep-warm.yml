name: Keep API warm

on:
  schedule:
    # Every 5 minutes — prevents Fly.io scale-to-zero cold starts
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://loreuniverse-api.fly.dev/health)
          echo "Health endpoint returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS" >&2
          fi
